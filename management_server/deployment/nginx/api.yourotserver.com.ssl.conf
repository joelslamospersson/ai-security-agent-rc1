# AI Security Management Server — Production HTTPS API Gateway
# Serves: https://api.yourotserver.com → Management Server (127.0.0.1:8000)
#
# This file is managed by certbot for SSL certificate renewal.
# Do NOT modify the SSL-related lines marked "# managed by Certbot".
# certbot renew will update those automatically.

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.yourotserver.com;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    access_log /var/log/nginx/ai-security-api.access.log;
    error_log /var/log/nginx/ai-security-api.error.log;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourotserver.com;

    # ─── SSL ────────────────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/api.yourotserver.com/fullchain.pem;        # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.yourotserver.com/privkey.pem;      # managed by Certbot
    ssl_trusted_certificate /etc/letsencrypt/live/api.yourotserver.com/chain.pem;    # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                                  # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                                    # managed by Certbot
    ssl_stapling on;                                                                  # managed by Certbot
    ssl_stapling_verify on;                                                           # managed by Certbot

    # ─── Security Headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API-appropriate Content Security Policy
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;

    # Permissions Policy — disable everything not needed by an API
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), cross-origin-isolated=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), navigation-override=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()" always;

    # ─── Proxy to Management Server ─────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 100m;

        # Timeouts (suitable for long-running API requests)
        proxy_connect_timeout 15s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ─── Health Check — no caching, no buffering ────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;
        proxy_buffering off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # ─── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/ai-security-api.access.log;
    error_log /var/log/nginx/ai-security-api.error.log;
}
