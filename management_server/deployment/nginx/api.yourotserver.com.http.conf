# AI Security Management Server — HTTP Bootstrap Config
# Used during initial setup BEFORE Let's Encrypt certificate is obtained.
# After certbot runs, this is replaced by the SSL config.
#
# Usage:
#   sudo cp this-file /etc/nginx/sites-available/api.yourotserver.com.conf
#   sudo ln -sf /etc/nginx/sites-available/api.yourotserver.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.yourotserver.com

server {
    listen 80;
    server_name api.yourotserver.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Proxy to Management Server
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/ai-security-api.access.log;
    error_log /var/log/nginx/ai-security-api.error.log;
}
